<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snus corp — Playlist</title>
  <style>
    :root {
      --bg: #06060b;
      --panel: #111118;
      --panel-2: #191923;
      --muted: #8c8a97;
      --muted-2: #6f6c78;
      --text: #f2f1f5;
      --line: rgba(255,255,255,0.1);
      --chip: #252330;
      --yellow: #ffd428;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 24%, rgba(45, 0, 140, 0.5), transparent 18%),
        radial-gradient(circle at 11% 12%, rgba(22, 0, 102, 0.9), transparent 10%),
        radial-gradient(circle at 20% 0%, rgba(78, 30, 201, 0.18), transparent 18%),
        linear-gradient(180deg, #0e0426 0%, #090612 24%, #06060b 62%);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 22px 32px;
    }

    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .nav-btn,
    .icon-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.88);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 26px;
      margin-bottom: 22px;
    }

    .hero-main {
      display: flex;
      gap: 26px;
      align-items: flex-start;
      min-width: 0;
    }

    .cover {
      width: 205px;
      height: 205px;
      border-radius: 10px;
      background:
        radial-gradient(circle at 70% 10%, rgba(78, 34, 204, 0.45), transparent 18%),
        radial-gradient(circle at 30% 60%, rgba(28, 0, 130, 0.8), transparent 28%),
        linear-gradient(130deg, #04010d 8%, #060117 38%, #0e0385 78%, #03030a 100%);
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .cover::before,
    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 22%, rgba(90, 62, 255, 0.3) 40%, transparent 56%);
      transform: translateX(-35%) skewX(-16deg);
      filter: blur(10px);
    }

    .cover::after {
      background: linear-gradient(120deg, transparent 48%, rgba(0, 0, 0, 0.36) 60%, transparent 78%);
      transform: translateX(28%) skewX(-14deg);
    }

    .meta {
      padding-top: 8px;
      min-width: 0;
    }

    .eyebrow {
      font-size: 14px;
      line-height: 1.2;
      color: rgba(255,255,255,0.46);
      margin-bottom: 10px;
      font-weight: 600;
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 5vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .desc,
    .updated {
      color: rgba(255,255,255,0.42);
      font-weight: 600;
      margin-top: 14px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 34px;
      flex-wrap: wrap;
    }

    .play-btn,
    .chip-btn,
    .upload-btn {
      border: none;
      border-radius: 999px;
      height: 40px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .play-btn {
      background: var(--yellow);
      color: #100d00;
      box-shadow: 0 10px 24px rgba(255, 212, 40, 0.18);
    }

    .chip-btn,
    .upload-btn {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.03);
    }

    .icon-row {
      display: flex;
      gap: 10px;
    }

    .upload-wrap {
      display: flex;
      align-items: flex-end;
      height: 205px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .upload-btn {
      padding: 0 24px;
      color: rgba(255,255,255,0.8);
    }

    .search {
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.16);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      color: rgba(255,255,255,0.42);
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .search input {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      outline: none;
    }

    .tracks {
      margin-top: 8px;
    }

    .track {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) 34px 62px;
      align-items: center;
      gap: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      color: rgba(255,255,255,0.82);
    }

    .track:hover {
      background: rgba(255,255,255,0.04);
    }

    .art {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      overflow: hidden;
      flex: 0 0 auto;
      background: #1a1a1a;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .track-text {
      min-width: 0;
      line-height: 1.18;
    }

    .track-title {
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 14px;
      color: rgba(255,255,255,0.52);
      margin-top: 4px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .time,
    .heart {
      color: rgba(255,255,255,0.42);
      text-align: right;
      font-weight: 700;
    }

    .heart {
      font-size: 22px;
      line-height: 1;
    }

    .muted {
      opacity: 0.34;
    }

    svg { display: block; }

    @media (max-width: 980px) {
      .hero {
        flex-direction: column;
      }

      .hero-main {
        flex-direction: column;
      }

      .upload-wrap {
        height: auto;
        margin-left: 0;
      }

      h1 {
        font-size: 48px;
      }
    }

    @media (max-width: 640px) {
      .page { padding: 16px; }
      .cover { width: 170px; height: 170px; }
      .track {
        grid-template-columns: 36px minmax(0, 1fr) 52px;
      }
      .heart { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="nav">
      <button class="nav-btn" aria-label="Назад">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M9.8 3.2 5 8l4.8 4.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="nav-btn" aria-label="Вперёд">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="m6.2 3.2 4.8 4.8-4.8 4.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <section class="hero">
      <div class="hero-main">
        <div class="cover" aria-label="Обложка плейлиста"></div>

        <div class="meta">
          <div class="eyebrow">Плейлист</div>
          <h1>Snus corp</h1>
          <div class="desc">Добавить описание...</div>
          <div class="updated">Александр обновил плейлист 17 октября 2025 г.</div>

          <div class="actions">
            <button class="play-btn">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                <path d="M3 2.2v8.6l7-4.3-7-4.3Z" fill="currentColor"/>
              </svg>
              Слушать
            </button>

            <button class="chip-btn">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M9 3v12M5.5 6v6M12.5 5v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              Трейлер
            </button>

            <div class="icon-row">
              <button class="icon-circle" aria-label="Нравится">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                  <path d="M9 15.2 3.5 10A3.5 3.5 0 1 1 8.8 5.4L9 5.6l.2-.2A3.5 3.5 0 1 1 14.5 10 341.6 341.6 0 0 1 9 15.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
              </button>

              <button class="icon-circle" aria-label="Поделиться">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                  <path d="m10.8 4.2 3.8.5-.6 3.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="m14.3 4.7-6.6 6.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M8 4.8H5.8A2.8 2.8 0 0 0 3 7.6v4.6A2.8 2.8 0 0 0 5.8 15H10a2.8 2.8 0 0 0 2.8-2.8V10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>

              <button class="icon-circle" aria-label="Ещё">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
                  <circle cx="4" cy="9" r="1.4"/>
                  <circle cx="9" cy="9" r="1.4"/>
                  <circle cx="14" cy="9" r="1.4"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="upload-wrap">
        <button class="upload-btn">Загрузить трек</button>
      </div>
    </section>

    <label class="search" aria-label="Поиск трека">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="5.7" stroke="currentColor" stroke-width="1.6"/>
        <path d="m12.5 12.5 3.2 3.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Поиск трека" />
    </label>

    <section class="tracks">
      <article class="track muted">
        <div class="art">
          <img alt="Meine kleine Welt" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72' viewBox='0 0 72 72'><rect width='72' height='72' fill='%23f6f6f6'/><rect x='6' y='6' width='60' height='60' fill='%23090909'/><path d='M15 53c15-4 16-24 30-23 7 0 10 4 12 8v14H15Z' fill='%23fff'/><circle cx='28' cy='24' r='9' fill='%23fff'/><rect x='39' y='15' width='14' height='6' rx='2' fill='%23fff'/></svg>" />
        </div>
        <div class="track-text">
          <div class="track-title">Meine kleine Welt</div>
          <div class="track-artist">Frontal</div>
        </div>
        <div class="heart"></div>
        <div class="time">03:34</div>
      </article>

      <article class="track">
        <div class="art">
          <img alt="Die Goitzsche brennt" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72' viewBox='0 0 72 72'><rect width='72' height='72' fill='%23f4efe4'/><rect x='10' y='8' width='52' height='56' rx='2' fill='%23fffdf8'/><path d='M19 19h34' stroke='%23d3b46d' stroke-width='6'/><path d='M19 33h19' stroke='%23caa35d' stroke-width='5'/><path d='M19 44h28' stroke='%23caa35d' stroke-width='5'/><path d='M44 22 55 33 44 44 33 33Z' fill='none' stroke='%23868fa4' stroke-width='3'/></svg>" />
        </div>
        <div class="track-text">
          <div class="track-title">Die Goitzsche brennt</div>
          <div class="track-artist">Goitzsche Front</div>
        </div>
        <div class="heart">♡</div>
        <div class="time">03:50</div>
      </article>

      <article class="track">
        <div class="art">
          <img alt="Der Mensch verdient die Erde nicht" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72' viewBox='0 0 72 72'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop stop-color='%23101012'/><stop offset='1' stop-color='%233b1010'/></linearGradient></defs><rect width='72' height='72' fill='url(%23g)'/><circle cx='36' cy='26' r='13' fill='%235f0f14'/><path d='M15 58c4-15 17-21 21-21s17 6 21 21' fill='%230d0d0f' stroke='%238f1d24' stroke-width='2'/></svg>" />
        </div>
        <div class="track-text">
          <div class="track-title">Der Mensch verdient die Erde nicht</div>
          <div class="track-artist">Composite sample</div>
        </div>
        <div class="heart">♡</div>
        <div class="time">03:40</div>
      </article>
    </section>
  </div>
</body>
</html>
