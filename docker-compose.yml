services:
  postgres:
    image: postgres:16-alpine
    container_name: music-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  music-server:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: music-server
    env_file:
      - .env
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - soundhub_data:/data
      - soundhub_music:/music
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  soundhub_data:
  soundhub_music:
