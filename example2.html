<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Идентичный плеер</title>
  <style>
    :root {
      --bg: #030303;
      --player: #3d3b3a;
      --player-border: rgba(255,255,255,0.06);
      --text: #f1f1f1;
      --muted: rgba(255,255,255,0.62);
      --icon: rgba(255,255,255,0.64);
      --icon-dim: rgba(255,255,255,0.2);
      --yellow: #f4cf2f;
      --yellow-soft: #ffd94c;
      --track: rgba(255,255,255,0.16);
      --bubble: #191919;
      --bubble-border: rgba(255,255,255,0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 22px 0;
    }

    .stage {
      width: 100%;
      min-height: 100vh;
      border-top: 1px solid rgba(255,255,255,0.14);
      border-bottom: 1px solid rgba(255,255,255,0.14);
      padding: 64px 0 14px;
      position: relative;
      overflow: hidden;
    }

    .player {
      width: calc(100% - 20px);
      height: 80px;
      margin: 0 auto;
      position: relative;
      border-radius: 14px;
      background: linear-gradient(180deg, #464342 0%, #403d3d 100%);
      border: 1px solid var(--player-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: visible;
    }

    .fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 35.15%;
      background: rgba(255,255,255,0.045);
      border-radius: 14px 0 0 14px;
      pointer-events: none;
    }

    .top-line {
      position: absolute;
      left: 0;
      top: 0;
      height: 4px;
      width: 35.15%;
      background: var(--yellow);
      border-radius: 14px 2px 2px 0;
      z-index: 3;
      pointer-events: none;
    }

    .progress-layer {
      position: absolute;
      left: 0;
      right: 0;
      top: -48px;
      height: 48px;
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
      z-index: 5;
    }

    .player:hover .progress-layer,
    .player.progress-active .progress-layer {
      opacity: 1;
      pointer-events: auto;
    }

    .progress-range {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 18px;
    }

    .hover-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 8px;
      height: 2px;
      background: rgba(255,255,255,0.28);
      box-shadow: 0 1px 0 rgba(0,0,0,0.55);
    }

    .hover-fill {
      position: absolute;
      left: 0;
      top: 8px;
      height: 2px;
      width: 35.15%;
      background: var(--yellow);
      transition: background-color .15s ease;
    }

    .player.seek-hover .hover-fill,
    .player.dragging .hover-fill {
      background: var(--yellow-soft);
    }

    .progress-thumb {
      position: absolute;
      left: 35.15%;
      top: 4px;
      width: 12px;
      height: 12px;
      margin-left: -6px;
      border-radius: 50%;
      background: var(--yellow);
      transition: background-color .15s ease, transform .15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.28);
    }

    .player.seek-hover .progress-thumb,
    .player.dragging .progress-thumb {
      background: var(--yellow-soft);
      transform: scale(1.04);
    }

    .time-badge {
      position: absolute;
      bottom: 18px;
      min-width: 56px;
      height: 40px;
      padding: 0 10px;
      border-radius: 14px;
      background: var(--bubble);
      border: 1px solid var(--bubble-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: rgba(255,255,255,0.9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      white-space: nowrap;
    }

    .time-badge.current {
      left: 35.15%;
      transform: translateX(-50%);
    }

    .time-badge.total {
      right: 10px;
    }

    .time-badge::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      width: 12px;
      height: 12px;
      background: var(--bubble);
      border-left: 1px solid var(--bubble-border);
      border-bottom: 1px solid var(--bubble-border);
      transform: translateX(-50%) rotate(-45deg);
    }

    .time-badge.total::after {
      display: none;
    }

    .player-row {
      height: 100%;
      display: grid;
      grid-template-columns: 320px 1fr 252px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .track-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 14px;
      min-width: 0;
    }

    .cover {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      flex: 0 0 auto;
      object-fit: cover;
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
    }

    .meta-text {
      min-width: 0;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .track-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dots {
      color: rgba(255,255,255,0.44);
      font-size: 20px;
      line-height: 1;
      transform: translateY(-1px);
      flex: 0 0 auto;
    }

    .track-artist {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.56);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .center-controls,
    .right-controls {
      display: flex;
      align-items: center;
    }

    .center-controls {
      justify-content: center;
      gap: 6px;
    }

    .right-controls {
      justify-content: flex-end;
      gap: 8px;
      padding-right: 16px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 0;
      background: transparent;
      color: var(--icon);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .icon-btn.dim {
      color: var(--icon-dim);
    }

    .icon-btn:hover {
      color: rgba(255,255,255,0.88);
    }

    .icon-btn.dim:hover {
      color: rgba(255,255,255,0.32);
    }

    .play-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 0;
      background: var(--yellow);
      color: #1c1400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 8px;
      padding: 0;
    }

    .play-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    @media (max-width: 1200px) {
      .player-row {
        grid-template-columns: 290px 1fr 210px;
      }
    }

    @media (max-width: 980px) {
      .player {
        height: auto;
      }

      .player-row {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px 0;
      }

      .track-meta,
      .right-controls {
        justify-content: center;
        padding: 0 14px;
      }

      .right-controls {
        padding-bottom: 6px;
      }

      .time-badge.total {
        right: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="player" id="player">
      <div class="fill" id="fill"></div>
      <div class="top-line" id="topLine"></div>

      <div class="progress-layer" id="progressLayer">
        <div class="time-badge current" id="currentBadge">01:12</div>
        <div class="time-badge total" id="totalBadge">03:22</div>
        <div class="progress-range" id="progressRange" aria-label="Прогресс трека" role="slider" aria-valuemin="0" aria-valuemax="202" aria-valuenow="72" tabindex="0">
          <div class="hover-track"></div>
          <div class="hover-fill" id="hoverFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
      </div>

      <div class="player-row">
        <div class="track-meta">
          <img
            class="cover"
            alt="Обложка трека"
            src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 96 96'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop stop-color='%23050505'/><stop offset='1' stop-color='%230f0f0f'/></linearGradient></defs><rect width='96' height='96' fill='url(%23g)'/><g fill='none' stroke='%23bdbdbd' stroke-opacity='.55'><path d='M11 46c5-20 22-30 38-29 16 1 29 9 40 24'/><path d='M10 53c12-9 23-13 39-14 17-1 27 4 37 13'/><path d='M15 63c18-8 31-8 49-3 7 2 13 5 18 10'/><path d='M20 74c14-6 28-6 44-2 6 2 11 4 15 8'/><path d='M25 26c7 9 10 19 8 34'/><path d='M40 18c4 10 4 22 0 38'/><path d='M57 17c1 12-1 24-7 38'/><path d='M72 22c-2 11-8 21-17 32'/></g></svg>"
          />
          <div class="meta-text">
            <div class="title-row">
              <div class="track-title">Марсианин</div>
              <div class="dots">•••</div>
            </div>
            <div class="track-artist">HORUS</div>
          </div>
        </div>

        <div class="center-controls">
          <button class="icon-btn" aria-label="Нравится">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 20.2 5.65 14A4.4 4.4 0 1 1 12 8.29 4.4 4.4 0 1 1 18.35 14L12 20.2Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn dim" aria-label="Перемешать">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h2.8c1.2 0 2.2.46 3.02 1.28L13 11.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="m14.8 5.6 4 1.1-1.1 4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17h2.8c1.2 0 2.2-.46 3.02-1.28L13 12.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="m14.8 18.4 4-1.1-1.1-4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" aria-label="Предыдущий трек">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 6h2v12H7zM18.5 5.6v12.8L10.6 12l7.9-6.4Z"/></svg>
          </button>
          <button class="play-btn" id="playBtn" aria-label="Пауза">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.2 6.5h2.9v11H8.2zM12.9 6.5h2.9v11h-2.9z"/></svg>
          </button>
          <button class="icon-btn" aria-label="Следующий трек">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15 6h2v12h-2zM5.5 5.6 13.4 12l-7.9 6.4V5.6Z"/></svg>
          </button>
          <button class="icon-btn dim" aria-label="Повтор">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8.5 7H16a3 3 0 0 1 3 3v1.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="m16.8 9.4 2.2 2.1 2.1-2.2" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.5 17H8a3 3 0 0 1-3-3v-1.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M7.2 14.6 5 12.5 2.9 14.7" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" aria-label="Без звука">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5.6 9.4h3.2l4.2-3.5v12.2L8.8 14.6H5.6z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/><path d="m4 4 16 16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="right-controls">
          <button class="icon-btn" aria-label="Текст">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7.5h9M8 12h11M10 16.5h9" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M4 6h3M5.5 6v12" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
          </button>
          <button class="icon-btn" aria-label="Очередь">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 7h10M9 12h10M9 17h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><circle cx="5" cy="7" r="1.3" fill="currentColor"/><circle cx="5" cy="12" r="1.3" fill="currentColor"/><circle cx="5" cy="17" r="1.3" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" aria-label="Настройки звука">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h8M5 17h14M11 12h8" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><circle cx="16" cy="7" r="2.1" stroke="currentColor" stroke-width="1.9"/><circle cx="8" cy="17" r="2.1" stroke="currentColor" stroke-width="1.9"/><circle cx="14" cy="12" r="2.1" stroke="currentColor" stroke-width="1.9"/></svg>
          </button>
          <button class="icon-btn" aria-label="Громкость">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5.5 9.4h3.1l4.1-3.5v12.2l-4.1-3.5H5.5z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/><path d="M16.2 9.2a4 4 0 0 1 0 5.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const player = document.getElementById('player');
    const progressRange = document.getElementById('progressRange');
    const fill = document.getElementById('fill');
    const topLine = document.getElementById('topLine');
    const hoverFill = document.getElementById('hoverFill');
    const progressThumb = document.getElementById('progressThumb');
    const currentBadge = document.getElementById('currentBadge');
    const totalBadge = document.getElementById('totalBadge');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');

    const duration = 202;
    let current = 72;
    let playing = true;
    let dragging = false;

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function setProgress(seconds) {
      current = Math.max(0, Math.min(duration, seconds));
      const percent = (current / duration) * 100;
      fill.style.width = `${percent}%`;
      topLine.style.width = `${percent}%`;
      hoverFill.style.width = `${percent}%`;
      progressThumb.style.left = `${percent}%`;
      currentBadge.style.left = `${percent}%`;
      currentBadge.textContent = formatTime(current);
      totalBadge.textContent = formatTime(duration);
      progressRange.setAttribute('aria-valuenow', Math.round(current));
    }

    function pointerToTime(clientX) {
      const rect = progressRange.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return ratio * duration;
    }

    function showPauseIcon() {
      playIcon.innerHTML = '<path d="M8.2 6.5h2.9v11H8.2zM12.9 6.5h2.9v11h-2.9z"/>';
      playBtn.setAttribute('aria-label', 'Пауза');
    }

    function showPlayIcon() {
      playIcon.innerHTML = '<path d="M9 7.3v9.4l7.8-4.7L9 7.3Z"/>';
      playBtn.setAttribute('aria-label', 'Воспроизвести');
    }

    let timer = setInterval(() => {
      if (!playing || dragging) return;
      current += 1;
      if (current > duration) current = 0;
      setProgress(current);
    }, 1000);

    playBtn.addEventListener('click', () => {
      playing = !playing;
      if (playing) showPauseIcon();
      else showPlayIcon();
    });

    progressRange.addEventListener('mouseenter', () => {
      player.classList.add('seek-hover');
      player.classList.add('progress-active');
    });

    progressRange.addEventListener('mouseleave', () => {
      if (!dragging) player.classList.remove('seek-hover');
    });

    progressRange.addEventListener('mousemove', (event) => {
      if (dragging) {
        setProgress(pointerToTime(event.clientX));
      }
    });

    progressRange.addEventListener('mousedown', (event) => {
      dragging = true;
      player.classList.add('dragging');
      player.classList.add('seek-hover');
      player.classList.add('progress-active');
      setProgress(pointerToTime(event.clientX));
      event.preventDefault();
    });

    window.addEventListener('mousemove', (event) => {
      if (!dragging) return;
      setProgress(pointerToTime(event.clientX));
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      player.classList.remove('dragging');
    });

    player.addEventListener('mouseenter', () => {
      player.classList.add('progress-active');
    });

    player.addEventListener('mouseleave', () => {
      if (!dragging) {
        player.classList.remove('progress-active');
        player.classList.remove('seek-hover');
      }
    });

    progressRange.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight') {
        setProgress(current + 5);
        event.preventDefault();
      }
      if (event.key === 'ArrowLeft') {
        setProgress(current - 5);
        event.preventDefault();
      }
      if (event.key === 'Home') {
        setProgress(0);
        event.preventDefault();
      }
      if (event.key === 'End') {
        setProgress(duration);
        event.preventDefault();
      }
    });

    setProgress(current);
    showPauseIcon();
  </script>
</body>
</html>
