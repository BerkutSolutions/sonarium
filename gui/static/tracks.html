<link rel="stylesheet" href="/static/styles.css" />
<section class="sh-section sh-page-shell sh-media-page">
  <div class="sh-tracks-toolbar">
    <input id="tracks-search" type="search" class="sh-tracks-search" data-i18n-placeholder="tracks_search_placeholder" placeholder="Search tracks" />
    <label class="sh-tracks-duplicates-toggle">
      <input type="checkbox" id="tracks-duplicates-only" />
      <span data-i18n="tracks_duplicates_only">Show duplicates only</span>
    </label>
  </div>
  <div id="tracks-list" class="sh-detail-track-list sh-track-page-list"></div>
</section>
