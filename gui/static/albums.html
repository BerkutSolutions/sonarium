<link rel="stylesheet" href="/static/styles.css" />
<section class="sh-section sh-page-shell sh-media-page">
  <div id="albums-list" class="sh-grid"></div>
</section>

<div id="album-modal" class="sh-modal-backdrop" hidden>
  <div class="sh-modal sh-media-modal">
    <header class="sh-modal-header">
      <h3 id="album-modal-heading" data-i18n="album_contents">Album</h3>
      <button type="button" id="album-modal-close" class="sh-modal-close" aria-label="Close">×</button>
    </header>
    <div class="sh-modal-body">
      <div class="sh-media-cover-wrap">
        <img id="album-modal-cover" src="/static/logo.png" alt="cover" class="sh-modal-cover" />
        <label class="sh-cover-upload-btn">
          <span data-i18n="upload">Upload</span>
          <input id="album-cover-input" type="file" accept="image/*" hidden />
        </label>
      </div>

      <div class="sh-media-content">
        <div class="sh-media-eyebrow" data-i18n="album_contents">Album</div>
        <div class="sh-media-title-row">
          <h1 id="album-modal-title-view" class="sh-media-title"></h1>
          <button id="album-name-edit-btn" type="button" class="sh-icon-btn sh-media-edit-btn" aria-label="Edit" data-i18n-aria-label="edit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 16.5V20h3.5L18 9.5 14.5 6zM19.7 7.8a1 1 0 0 0 0-1.4l-2.1-2.1a1 1 0 0 0-1.4 0L14.8 5.7l3.5 3.5z"/></svg>
          </button>
        </div>
        <input id="album-modal-title" type="text" class="sh-media-title-input" hidden />

        <div class="sh-modal-inline">
          <select id="album-modal-artist"></select>
          <input id="album-modal-year" type="number" min="0" max="3000" />
        </div>

        <div id="album-modal-id-row" class="sh-modal-info-line" hidden>
          <span>ID</span>
          <strong id="album-modal-id">-</strong>
        </div>

        <div class="sh-media-actions">
          <button type="button" id="album-modal-play" data-i18n="play">Play</button>
          <button type="button" id="album-modal-queue" data-i18n="add_to_queue">Add to queue</button>
          <button type="button" id="album-modal-edit" data-i18n="edit">Edit</button>
          <button type="button" id="album-modal-save" data-i18n="save">Save</button>
          <button type="button" id="album-modal-delete" data-i18n="delete">Delete</button>
        </div>

        <div class="sh-modal-info-line">
          <span data-i18n="tracks">Tracks</span><strong id="album-modal-tracks-count">0</strong>
        </div>
        <div class="sh-media-search">
          <input id="album-modal-track-search" type="text" data-i18n-placeholder="search_placeholder" placeholder="Search tracks" />
        </div>
        <div id="album-modal-search-results" class="sh-list"></div>
        <div id="album-modal-tracks" class="sh-list sh-ya-track-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="album-merge-modal" class="sh-modal-backdrop" hidden>
  <div class="sh-modal sh-artist-edit-modal">
    <header class="sh-modal-header">
      <h3 data-i18n="merge_album">Merge album</h3>
      <button type="button" id="album-merge-close" class="sh-modal-close" aria-label="Close">×</button>
    </header>
    <div class="sh-modal-body">
      <form id="album-merge-form" class="sh-detail-edit-form">
        <label class="sh-detail-edit-field">
          <span data-i18n="merge_source_album">Album to merge</span>
          <input type="text" id="album-merge-source" disabled />
        </label>
        <label class="sh-detail-edit-field">
          <span data-i18n="merge_target_album">Merge into album</span>
          <select id="album-merge-target" required></select>
        </label>
        <p class="sh-library-panel-copy" data-i18n="merge_album_hint">The selected target album stays the main album. Tracks will only be moved into it.</p>
        <div class="sh-detail-edit-actions">
          <button type="button" class="btn ghost" id="album-merge-cancel" data-i18n="cancel">Cancel</button>
          <button type="submit" class="btn primary" data-i18n="merge">Merge</button>
        </div>
      </form>
    </div>
  </div>
</div>
